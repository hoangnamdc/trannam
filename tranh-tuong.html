<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tranh tường</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* MENU */
.menu {
  background:#ff6a00;
  padding:15px;
  text-align:center;
}
.menu a {
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

/* TITLE */
h2 {
  text-align:center;
  margin:20px;
}

/* GALLERY */
.gallery {
  column-count:3;
  column-gap:15px;
  padding:20px;
}

.gallery img {
  width:100%;
  margin-bottom:15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover {
  transform:scale(1.03);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="menu">
  <a href="index.html">Trang chủ</a>
  <a href="tranh-tuong.html">Tranh tường</a>
  <a href="phu-dieu.html">Phù điêu</a>
</div>

<h2>TRANH TƯỜNG</h2>

<div class="gallery">
  <img src="tranh1.jpg" onclick="openImg(this)">
  <img src="tranh2.jpg" onclick="openImg(this)">
  <img src="tranh3.jpg" onclick="openImg(this)">
</div>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img">
</div>

<script>
function openImg(img){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src = img.src;
}
</script>

</body>
</html>
