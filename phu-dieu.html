<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phù điêu</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* MENU */
.menu {
  background:#ff6a00;
  padding:15px;
  text-align:center;
}
.menu a {
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

/* TITLE */
h2 {
  text-align:center;
  margin:20px;
}

/* GALLERY */
.gallery {
  column-count:3;
  column-gap:15px;
  padding:20px;
}

.gallery img {
  width:100%;
  margin-bottom:15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover {
  transform:scale(1.03);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  top:0; 
  left:0;
  width:100%; 
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
  border-radius:10px;
  transition: transform 0.3s;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <a href="index.html">Trang chủ</a>
  <a href="tranh-tuong.html">Tranh tường</a>
  <a href="phu-dieu.html">Phù điêu</a>
</div>

<h2>PHÙ ĐIÊU</h2>

<!-- GALLERY -->
<div class="gallery">
  <img src="./tranh7.jpg" onclick="openImg(this)">
  <img src="./tranh8.jpg" onclick="openImg(this)">
  <img src="./tranh9.jpg" onclick="openImg(this)">
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img">
</div>

<script>
let scale = 1;

function openImg(img){
  const box = document.getElementById("lightbox");
  const lbImg = document.getElementById("lightbox-img");

  box.style.display = "flex";
  lbImg.src = img.src;

  scale = 1;
  lbImg.style.transform = "scale(1)";
}

/* Click zoom */
document.getElementById("lightbox-img").onclick = function(e){
  e.stopPropagation();
  scale += 0.5;
  if(scale > 3) scale = 1;
  this.style.transform = "scale(" + scale + ")";
}

/* Lăn chuột zoom */
document.getElementById("lightbox").addEventListener("wheel", function(e){
  e.preventDefault();
  const img = document.getElementById("lightbox-img");

  if(e.deltaY < 0){
    scale += 0.2;
  } else {
    scale -= 0.2;
  }

  if(scale < 1) scale = 1;
  if(scale > 4) scale = 4;

  img.style.transform = "scale(" + scale + ")";
});
</script>

</body>
</html>
